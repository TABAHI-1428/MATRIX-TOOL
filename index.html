/* ANIMATIONS */

from{transform:scale(0.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
from{opacity:1;}
to{opacity:0;}
}

@keyframes glow{

50%{text-shadow:0 0 25px #00ff00;}
100%{text-shadow:0 0 5px #00ff00;}
}

/* LOGIN */

left:0;

height:100vh;

align-items:center;

}

padding:10px;
margin:10px;
}

#loginScreen button{

background:#00ff00;
border:none;

/* WELCOME */

left:0;
width:100%;

/* MATRIX */

<script>

let stopProcess=false;


/* LOGIN */

function login(){

let p=document.getElementById("pass").value;

/* TERMINAL SOUND */

function beep(){
let s=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
s.play();
}

function type(lines,speed=900){

stopProcess=false;

let i=0;

function run(){

if(stopProcess) return;

if(i<lines.length){

document.getElementById("terminal").innerHTML+=lines[i]+"<br>";

beep();

i++;

setTimeout(run,speed);

}

}

run();

}

function randomIP(){
return Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
}

function randomGPS(){
return (Math.random()*180-90).toFixed(5)+", "+(Math.random()*360-180).toFixed(5);
}

function openPanel(title){

document.getElementById("dashboard").style.display="none";
document.getElementById("panel").style.display="block";

document.getElementById("terminal").innerHTML="";
document.getElementById("inputArea").innerHTML="";
document.getElementById("error").innerHTML="";

}

function back(){

stopProcess=true;

document.getElementById("panel").style.display="none";
document.getElementById("phoneControlScreen").style.display="none";
document.getElementById("cctvScreen").style.display="none";

document.getElementById("terminal").innerHTML="";
document.getElementById("inputArea").innerHTML="";

function startLocation(){

return;

/* 10 digit validation */

return;
}

"Connecting to satellite...",
"Target: "+t,
"IP Address: "+randomIP(),
"GPS Coordinates: "+randomGPS(),
"Tracking signal...",
"Location locked ✔"

];

type(lines);

window.location.href="https://www.google.com/android/find";
},5000);

}

/* COUNTDOWN */

startDestructionProcess();

}

},1000);

}

/* MATRIX PARTICLES */

let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%^&*";
letters = letters.split("");

let fontSize = 16;
let columns = canvas.width / fontSize;

let drops = [];

for (let i = 0; i < columns; i++) {
    drops[i] = 1;
}

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff00";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

let text = letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

window.addEventListener("resize",function(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

});

window.addEventListener("resize",function(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
